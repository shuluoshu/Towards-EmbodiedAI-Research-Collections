    <style>
      :root {

        --blue: #0b6bcb;
        --green: #087f5b;
        --amber: #a16207;
        --red: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", "Segoe UI", sans-serif;
        line-height: 1.58;
      }

      a {
        color: var(--blue);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(12px);
      }

      .bar {
        max-width: 1280px;
        margin: 0 auto;
        padding: 18px 22px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.18;
      }

      .lead {
        margin: 0;
        color: var(--muted);
        max-width: 920px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }

      button {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        padding: 7px 11px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
      }

      button.active {
        border-color: var(--blue);
        color: var(--blue);
        background: #eef6ff;
      }

      main {
        max-width: 1280px;
        margin: 0 auto;
        padding: 22px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--card);
        overflow: hidden;
      }

      .card-head {
        display: grid;
        grid-template-columns: 72px minmax(0, 1fr);
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid #edf0f4;
      }

      .pid {
        display: grid;
        place-items: center;
        height: 42px;
        border-radius: 6px;
        background: #edf2f7;
        font-weight: 700;
      }

      .title {
        margin: 0;
        font-size: 17px;
        line-height: 1.3;
      }

      .meta {
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
      }

      .body {
        padding: 16px;
      }

      .memory {
        margin: 0 0 12px;
        color: #26323f;
      }

      .diagram {
        display: grid;
        grid-template-columns: repeat(var(--cols), minmax(90px, 1fr));
        align-items: stretch;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 3px;
      }

      .node {
        position: relative;
        min-height: 74px;
        border: 1px solid #dfe5ee;
        border-radius: 7px;
        background: #f9fbfd;
        padding: 9px 10px;
      }

      .node::after {
        content: "→";
        position: absolute;
        right: -14px;
        top: 50%;
        transform: translateY(-50%);
        color: #8592a3;
        font-weight: 700;
      }

      .node:last-child::after {
        content: "";
      }

      .node strong {
        display: block;
        font-size: 13px;
        margin-bottom: 5px;
      }

      .node span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
      }

      .tagrow {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 12px;
      }

      .tag {
        border-radius: 999px;
        padding: 4px 8px;
        background: #eef2f7;
        color: #425466;
        font-size: 12px;
      }

      .route-vla .pid,
      .route-vla .tag:first-child {
        background: #eef6ff;
        color: var(--blue);
      }

      .route-flow .pid,
      .route-flow .tag:first-child {
        background: #eefbf6;
        color: var(--green);
      }

      .route-world .pid,
      .route-world .tag:first-child {
        background: #fff8e6;
        color: var(--amber);
      }

      .route-wam .pid,
      .route-wam .tag:first-child {
        background: #fff1f0;
        color: var(--red);
      }

      .route-deploy .pid,
      .route-deploy .tag:first-child,
      .route-other .pid,
      .route-other .tag:first-child {
        background: #f2f4f7;
        color: #344054;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 920px) {
        .grid {
          grid-template-columns: 1fr;
        }

        .card-head {
          grid-template-columns: 58px minmax(0, 1fr);
        }

        .diagram {
          grid-template-columns: repeat(var(--cols), 160px);
        }
      }
    </style>

          FLOW: "route-flow",
          WORLD: "route-world",
          WAM: "route-wam",
          DEPLOY: "route-deploy",
          OTHER: "route-other"
        }[route] || "route-other";
      }

      function renderFilters() {
        filters.innerHTML = Object.entries(labels).map(([key, label]) => (
          `<button class="${active === key ? "active" : ""}" data-key="${key}">${label}</button>`
        )).join("");
        filters.querySelectorAll("button").forEach((button) => {
          button.addEventListener("click", () => {
            active = button.dataset.key;
            renderFilters();
            renderCards();
          });
        });
      }

      function renderCards() {
        const visible = works.filter((work) => active === "ALL" || work[3] === active);
        grid.innerHTML = visible.map(([id, title, date, route, memory, nodes, tags]) => {
          const nodeHtml = nodes.map((node) => {
            const parts = node.split(" ");
            const head = parts.slice(0, 2).join(" ");
            const rest = parts.slice(2).join(" ");
            return `<div class="node"><strong>${head}</strong><span>${rest || node}</span></div>`;
          }).join("");
          return `
            <article class="card ${routeClass(route)}">
              <div class="card-head">
                <div class="pid">${id}</div>
                <div>
                  <h2 class="title">${title}</h2>
                  <div class="meta">${date} · ${labels[route]}</div>
                </div>
              </div>
              <div class="body">
                <p class="memory">${memory}</p>
                <div class="diagram" style="--cols:${nodes.length}">${nodeHtml}</div>
                <div class="tagrow">${tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}</div>
              </div>
            </article>
          `;
        }).join("");
      }

      renderFilters();
      renderCards();
    </script>
  </body>
</html>
